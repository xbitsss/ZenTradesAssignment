services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
      - .:/app
    working_dir: /app

  pipeline:
    build: .
    container_name: pipeline
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    command: tail -f /dev/null

volumes:
  n8n_data: